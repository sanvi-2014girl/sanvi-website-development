<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        div{
            height: 200px;
            width: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0px 0px 20px rgb(14, 171, 219);
            border-radius: 30px;
            
        }
        h1{
            color: rgb(224, 207, 106);
            font-size: 22px;
            font-weight: bold;
            transform: rotate(360deg);
            text-shadow: 0px 0px 20px rgb(171, 204, 219);
        }
    </style>
</head>
<body>
    <div>
        <h1>Lionel Messi</h1>
    </div>
    
</body>
</html>
