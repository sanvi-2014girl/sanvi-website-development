<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <h1><b>Sign Up Page</b></h1>
        <hr><br><br><br><br>

        <fieldset>
            <legend>Personal Information</legend>
            <form>
                <label>Name:</label>
                <input type="text"> <br><br>
                <label>Password:</label>
                <input type="password"><br><br>
                <label>Select Skills :</label>
                <input type="checkbox"><i>HTML</i>
                <input type="checkbox"><i>CSS</i>
                <input type="checkbox"><i>Javascript</i><br><br>
                <label>Select Gender:</label>
                <input type="radio" name="gender"><i>Male</i>
                <input type="radio" name="gender"><i>Female</i>
                <input type="radio" name="gender"><i>Others</i><br><br>
                <label>Select University:</label>
            <select name="University">
                <option value="IITD">IIT Delhi</option>
                <option value="IITD">IIT Bombay</option>
                <option value="NITB">NIT Bhopal</option>
            </select><br><br><br>
                <button>Submit</button>
            </form>
        </fieldset>
    </center>
    
</body>
</html>
