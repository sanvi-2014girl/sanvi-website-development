<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height:200vh
        }
        div{
            height: 200px;
            width:200px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: beige;
        }
        #div1{
            background-color: red;
            position: relative;
            top: 200px;
            left: 200px
        }
        #div2{
            background-color: orangered;
            position: absolute;
            left: 100px;
            top: 50px;
            z-index: 1;
        }
        #div3{
            background-color: rgb(235, 214, 32);
            position: fixed;
            top: 200px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="div1">
        ABSOLUTE
    </div>
    <div id="div2">
        FIXED
    </div>
    <div id="div3">
        RELATIVE
    </div>
    
</body>
</html>
