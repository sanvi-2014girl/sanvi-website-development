<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card{
            width: 300px;
            padding: 20px;
            border: 2px solid red;
            border-radius: 10px;
            margin: 20px auto;
            box-shadow: 2px 2px 20px;
            background-color: rgb(255, 81, 0);
            font-family: sans-serif;
        }
        .card img{
            width: 100%;
            border-radius: 10px;
        }
        .card p{
            font-size: 14px;
        }
        button{
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: bold;
            background-color: rgb(235, 135, 5);
            color: rgb(0, 0, 0);
        }
        #title{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #price{
            margin-right: 30px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://plus.unsplash.com/premium_photo-1675431443027-ad1f46c93c8d?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8cHJvZHVjdHN8ZW58MHx8MHx8fDA%3D" alt="Free Img">
        <div id="title">
            <h2>Card Title</h2>
            <p id="price">$60</p>
        </div>
        <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Tenetur ab iusto possimus reiciendis officia nulla corporis dolores amet impedit. Nam sit atque saepe consectetur rem voluptatibus omnis ipsa voluptatem iure?
        </p>
        <button>Buy Me</button>

    </div>
    
</body>
</html>
